name: Aletheia CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  monorepo:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Test
        run: pnpm -r run test

      - name: Build
        run: pnpm -r run build

      - name: Smoke core end-to-end
        run: pnpm run smoke:core-e2e
